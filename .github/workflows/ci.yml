name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: https://p49mq9wj2d.execute-api.sa-east-1.amazonaws.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      NEXT_PUBLIC_API_URL: https://p49mq9wj2d.execute-api.sa-east-1.amazonaws.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: sa-east-1
      - name: Deploy (S3 sync + CloudFront invalidation)
        run: |
          aws s3 sync out/ s3://loteriassim.com.br/ --delete
          aws cloudfront create-invalidation --distribution-id E3PSG08SY8CQCP --paths "/*"
